  空格: 空白鍵

notes:
  - 標點以全形為主（，。！？），數字與英文縮寫用半形。
  - 面向國小學生：句子短、少專有名詞、多用生活比喻。
  - 英文縮寫朗讀方式在旁白另外標注（例：URL 唸「網址」、Wi-Fi 保留原音）。
