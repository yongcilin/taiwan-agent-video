# 禁用左欄（中國大陸用語），一律改用右欄（台灣用語）。

forbidden_to_preferred:
  視頻: 影片
  信息: 資訊
  鼠標: 滑鼠
  文件夾: 資料夾
  文件: 檔案
  程序: 程式
  代碼: 程式碼
  默認: 預設
  互聯網: 網際網路
  網絡: 網路
  數據: 資料
  質量: 品質
  屏幕: 螢幕
  打印: 列印
  緩存: 快取
  用戶: 使用者
  軟件: 軟體
  硬件: 硬體
  服務器: 伺服器
  數據庫: 資料庫
  算法: 演算法
  優化: 最佳化
  卸載: 解除安裝
  安裝包: 安裝檔
  視訊號: 訊號
